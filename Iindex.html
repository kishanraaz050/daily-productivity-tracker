<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Productivity Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
    <h1>Daily Productivity Tracker</h1>

    <p id="date">Today's Date</p>

    <h2>Today's Goal</h2>
    <input type="text" id="goal" placeholder="Enter your goal">

    <div id="dailyTasks">
        <h2>Daily Tasks</h2>

        <input type="checkbox" id="skill">
        <label for="skill">Learn Skills</label>
        <br><br>

        <input type="checkbox" id="work">
        <label for="work">Work</label>
        <br><br>

        <input type="checkbox" id="english">
        <label for="english">Study English</label>
        <br><br>

        <input type="checkbox" id="bath">
        <label for="bath">Take a Bath</label>
        <br><br>

        <input type="checkbox" id="exercise">
        <label for="exercise">Daily Exercise</label>
        <br><br>
    </div>
    <h2>Add Custom Task</h2>
    <input type="text" id="newTask" placeholder="Enter a new task">
   <button id="addTask">Add Task</button>

    <div id="taskList"></div>

    <h2>Today's Note</h2>
    <textarea id="dailyNote" rows="6" cols="40" placeholder="Write your note here..."></textarea>

    <h2>Progress</h2>
<p id="completed">Completed: 0/0</p>

    <progress value="0" max="10"></progress>

    <h2>Score</h2>
<p id="score" style="display:none;"></p>

<p id="message" style="display:none;"></p>

    <p id="message">Keep Going 💪</p>

    <button id="checkScore">Check Score</button>
    </div>
<script src="script.js"></script>
</body>

</html>
